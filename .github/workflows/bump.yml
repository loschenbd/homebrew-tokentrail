name: Bump formula

on:
  repository_dispatch:
    types: [tokentrail-release]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to bump to (e.g. 0.2.1)'
        required: true

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ github.event.client_payload.version }}" ]; then
            echo "v=${{ github.event.client_payload.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "v=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute new sha256
        id: sha
        run: |
          V="${{ steps.version.outputs.v }}"
          # -f: a missing tag must fail the job, not hash GitHub's 404 page.
          SHA=$(curl -fsL "https://github.com/loschenbd/tokentrail/archive/refs/tags/v${V}.tar.gz" | shasum -a 256 | cut -d' ' -f1)
          if [ "${#SHA}" -ne 64 ]; then
            echo "::error::Bad sha256 for v${V}: '${SHA}'"
            exit 1
          fi
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Update formula
        run: |
          V="${{ steps.version.outputs.v }}"
          SHA="${{ steps.sha.outputs.sha }}"
          sed -i.bak -E "s|url \".*\"|url \"https://github.com/loschenbd/tokentrail/archive/refs/tags/v${V}.tar.gz\"|" Formula/tokentrail.rb
          sed -i.bak -E "s|sha256 \".*\"|sha256 \"${SHA}\"|" Formula/tokentrail.rb
          rm Formula/tokentrail.rb.bak

      # Push straight to main — no PR. A personal tap has one consumer; the
      # PR flow just produced redundant bump PRs whenever the release script
      # updated the formula directly (it races this workflow and always won).
      # If the formula is already at the target version, this is a no-op, so
      # manual bumps and this automation can coexist in either order.
      - name: Commit and push
        run: |
          V="${{ steps.version.outputs.v }}"
          if git diff --quiet Formula/tokentrail.rb; then
            echo "::notice::Formula already at v${V} (url + sha256 unchanged) — nothing to do."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/tokentrail.rb
          git commit -m "tokentrail ${V}"
          git push origin HEAD:main
