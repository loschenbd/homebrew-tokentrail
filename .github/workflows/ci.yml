name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  brew-install:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install from this checkout's formula
        # Modern brew rejects loose ./Formula/foo.rb — formulas must live in
        # a tap directory. Symlink the PR checkout as the user's tap so brew
        # can resolve `loschenbd/tokentrail/tokentrail` to this exact code.
        run: |
          set -euxo pipefail
          TAP_DIR="$(brew --repository)/Library/Taps/loschenbd/homebrew-tokentrail"
          mkdir -p "$(dirname "$TAP_DIR")"
          rm -rf "$TAP_DIR"
          ln -sf "$GITHUB_WORKSPACE" "$TAP_DIR"
          brew install --build-from-source loschenbd/tokentrail/tokentrail

      - name: Verify the binary works
        run: |
          tokentrail --version
          tokentrail --help | head -5

      - name: brew test
        run: brew test loschenbd/tokentrail/tokentrail
